org: jvnc0503
service: api-web-scraping-sismos

provider:
  name: aws
  runtime: python3.14
  memorySize: 1024
  timeout: 30
  iam:
    role: arn:aws:iam::${aws:accountId}:role/LabRole

functions:
  scrape_sismos:
    handler: scrap_sismos.lambda_handler
    package:
      include:
        - ./** # Incluye todo el contenido del directorio local
    events:
      - http:
          path: /scrape/sismos
          method: get
          cors: true
          integration: lambda

resources:
  Resources:
    TablaSismosIGP:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: TablaSismosIGP
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
